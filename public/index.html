<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" />
  <style>
    :root {
      --navy-950: #0a0e1a;
      --navy-900: #0f1629;
      --navy-800: #1a2240;
      --navy-700: #253057;
      --amber-400: #fbbf24;
      --amber-500: #f59e0b;
      --slate-100: #f1f5f9;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --green-400: #4ade80;
      --green-500: #22c55e;
      --red-400: #f87171;
      --red-500: #ef4444;
      --yellow-400: #facc15;
      --blue-400: #60a5fa;
      --purple-400: #c084fc;

      --bg: var(--navy-950);
      --bg-secondary: var(--navy-900);
      --bg-card: var(--navy-800);
      --bg-hover: var(--navy-700);
      --text: var(--slate-100);
      --text-secondary: var(--slate-400);
      --text-muted: var(--slate-500);
      --accent: var(--amber-500);
      --border: rgba(255,255,255,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex; align-items: center;
      padding: 0 1.5rem; gap: 1.5rem;
    }
    .logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 1rem; font-weight: 800; letter-spacing: -0.03em;
      flex-shrink: 0;
    }
    .logo-accent { color: var(--accent); }

    /* ── Nav tabs ── */
    .nav-tabs {
      display: flex; align-items: center; gap: 0.25rem;
      flex: 1;
    }
    .nav-tab {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem; font-weight: 600;
      color: var(--text-muted);
      background: transparent; border: none;
      border-radius: 6px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-tab.active { color: var(--text); background: var(--bg-card); }
    .nav-tab .tab-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 17px; height: 17px; padding: 0 4px;
      border-radius: 999px; font-size: 0.65rem; font-weight: 700;
    }
    .badge-urgent { background: rgba(239,68,68,0.2); color: var(--red-400); }
    .badge-active { background: rgba(251,191,36,0.15); color: var(--amber-400); }
    .badge-backlog { background: rgba(148,163,184,0.12); color: var(--slate-400); }
    .badge-cal { background: rgba(74,222,128,0.12); color: var(--green-400); }
    .badge-repo { background: rgba(96,165,250,0.12); color: var(--blue-400); }

    .header-right {
      display: flex; align-items: center; gap: 0.75rem; margin-left: auto;
    }
    .header-clock {
      font-size: 0.78rem; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green-400); animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .btn-sm {
      display: flex; align-items: center; gap: 0.3rem;
      padding: 0.3rem 0.7rem; background: transparent;
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-secondary); font-size: 0.75rem;
      font-family: inherit; cursor: pointer; transition: all 0.15s;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Views ── */
    .view-container {
      flex: 1; overflow: hidden; position: relative;
    }
    .view {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      overflow: hidden;
    }
    .view.active { display: flex; }

    /* View header */
    .view-header {
      flex-shrink: 0;
      padding: 1.25rem 2rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      display: flex; align-items: baseline; gap: 1rem;
    }
    .view-title {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em;
    }
    .view-subtitle {
      font-size: 0.8rem; color: var(--text-muted);
    }
    .view-body {
      flex: 1; overflow-y: auto; padding: 1.25rem 2rem;
    }
    .view-body::-webkit-scrollbar { width: 5px; }
    .view-body::-webkit-scrollbar-track { background: transparent; }
    .view-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Issue cards ── */
    .issues-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 0.75rem;
    }
    .issue-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.875rem 1rem;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      text-decoration: none; display: block;
    }
    .issue-card:hover { border-color: rgba(245,158,11,0.3); background: var(--bg-hover); }
    .issue-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 0.5rem; margin-bottom: 0.45rem;
    }
    .issue-title {
      font-size: 0.875rem; font-weight: 600; color: var(--text);
      line-height: 1.35; flex: 1;
    }
    .issue-num {
      font-size: 0.7rem; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace; flex-shrink: 0; margin-top: 1px;
    }
    .issue-meta {
      display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
    }
    .issue-repo { font-size: 0.72rem; font-weight: 600; color: var(--accent); }
    .issue-label {
      font-size: 0.65rem; font-weight: 500;
      padding: 0.1rem 0.4rem; border-radius: 999px;
      background: rgba(255,255,255,0.07); color: var(--text-secondary);
    }
    .issue-label.bug { background: rgba(239,68,68,0.15); color: var(--red-400); }
    .issue-label.enhancement { background: rgba(245,158,11,0.1); color: var(--amber-400); }
    .issue-label.frontend { background: rgba(96,165,250,0.1); color: var(--blue-400); }
    .issue-label.backend { background: rgba(192,132,252,0.1); color: var(--purple-400); }
    .issue-age { font-size: 0.68rem; color: var(--text-muted); margin-left: auto; }

    /* ── Calendar ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.75rem;
    }
    .event-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.875rem 1rem;
      border-left: 3px solid var(--accent);
    }
    .event-card.work { border-left-color: var(--blue-400); }
    .event-card.soon { border-left-color: var(--red-400); }
    .event-card.today { border-left-color: var(--green-400); }
    .event-title {
      font-size: 0.9rem; font-weight: 600; color: var(--text);
      margin-bottom: 0.35rem; line-height: 1.3;
    }
    .event-time {
      font-size: 0.75rem; color: var(--amber-400);
      font-family: 'JetBrains Mono', monospace; margin-bottom: 0.3rem;
    }
    .event-sub {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; color: var(--text-muted);
    }
    .event-cal-badge {
      font-size: 0.62rem; font-weight: 600; padding: 0.1rem 0.35rem;
      border-radius: 3px; background: rgba(96,165,250,0.12); color: var(--blue-400);
    }
    .event-cal-badge.personal { background: rgba(245,158,11,0.12); color: var(--amber-400); }

    /* ── Repos ── */
    .repos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.75rem;
    }
    .repo-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.25rem;
      text-decoration: none; display: block;
      transition: border-color 0.15s, transform 0.15s;
    }
    .repo-card:hover { border-color: rgba(245,158,11,0.3); transform: translateY(-1px); }
    .repo-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 0.875rem;
    }
    .repo-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .repo-open {
      font-size: 0.72rem; font-weight: 700; color: var(--amber-400);
      background: rgba(245,158,11,0.1); padding: 0.2rem 0.55rem; border-radius: 999px;
    }
    .repo-stats { display: flex; gap: 1.5rem; }
    .repo-stat { display: flex; flex-direction: column; gap: 0.2rem; }
    .repo-stat-label {
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted);
    }
    .repo-stat-val { font-size: 1rem; font-weight: 700; color: var(--text); }
    .repo-stat-val.red { color: var(--red-400); }
    .repo-stat-val.blue { color: var(--blue-400); }

    /* ── Home ── */
    .home-hero {
      position: relative; overflow: hidden;
      padding: 2rem 0 2.5rem;
      margin-bottom: 1.5rem;
    }
    .home-hero-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .home-hero-content { position: relative; }
    .home-logo {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 1.75rem; font-weight: 900; letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }
    .home-tagline {
      font-size: 0.9rem; color: var(--text-muted); margin: 0;
    }
    .home-stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .home-stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem 1.5rem;
      cursor: pointer; transition: border-color 0.15s, transform 0.15s;
      text-decoration: none; display: block;
    }
    .home-stat-card:hover {
      border-color: rgba(245,158,11,0.3); transform: translateY(-2px);
    }
    .home-stat-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 0.5rem;
    }
    .home-stat-val {
      font-size: 2rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1;
      margin-bottom: 0.3rem;
    }
    .home-stat-sub {
      font-size: 0.72rem; color: var(--text-muted);
    }
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .home-section-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 0.75rem;
    }
    .home-event-item, .home-issue-item, .home-task-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.75rem 1rem;
      margin-bottom: 0.5rem; cursor: pointer;
      transition: border-color 0.15s;
      text-decoration: none; display: block;
    }
    .home-event-item:hover, .home-issue-item:hover, .home-task-item:hover {
      border-color: rgba(245,158,11,0.3);
    }
    .home-item-title {
      font-size: 0.85rem; font-weight: 600; color: var(--text);
      margin-bottom: 0.25rem; line-height: 1.3;
    }
    .home-item-meta {
      font-size: 0.72rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .home-item-accent { color: var(--accent); }

    /* ── Infra ── */
    .infra-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }
    .infra-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .infra-stat {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.25rem;
    }
    .infra-stat-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 0.4rem;
    }
    .infra-stat-val {
      font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em;
    }
    .infra-stat-val.green { color: var(--green-400); }
    .infra-stat-val.red { color: var(--red-400); }
    .infra-stat-val.amber { color: var(--amber-400); }
    .process-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.1rem 1.25rem;
      border-left: 3px solid var(--border);
    }
    .process-card.online { border-left-color: var(--green-500); }
    .process-card.stopped { border-left-color: var(--red-500); }
    .process-card.erroring { border-left-color: var(--yellow-400); }
    .process-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 0.75rem;
    }
    .process-name { font-size: 0.95rem; font-weight: 700; }
    .process-badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.18rem 0.55rem; border-radius: 999px;
      font-size: 0.68rem; font-weight: 600;
    }
    .process-badge.online { background: rgba(34,197,94,0.12); color: var(--green-400); }
    .process-badge.stopped { background: rgba(239,68,68,0.12); color: var(--red-400); }
    .process-badge.erroring { background: rgba(250,204,21,0.12); color: var(--yellow-400); }
    .process-badge .dot {
      width: 5px; height: 5px; border-radius: 50%; background: currentColor;
    }
    .online .dot { animation: pulse-dot 2s infinite; }
    .process-metrics {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.4rem;
      margin-bottom: 0.6rem;
    }
    .pm { background: var(--bg-secondary); border-radius: 7px; padding: 0.4rem 0.6rem; }
    .pm-label { font-size: 0.62rem; color: var(--text-muted); margin-bottom: 0.15rem; }
    .pm-val { font-size: 0.82rem; font-weight: 700; color: var(--text); }
    .pm-val.accent { color: var(--accent); }
    .process-id {
      font-size: 0.68rem; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Tasks ── */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.6rem;
    }
    .task-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.75rem 1rem;
      border-left: 3px solid var(--purple-400);
      transition: border-color 0.15s;
    }
    .task-card.amber { border-left-color: var(--amber-400); }
    .task-card.blue { border-left-color: var(--blue-400); }
    .task-card.green { border-left-color: var(--green-400); }
    .task-card:hover { border-color: rgba(192,132,252,0.4); }
    .task-title {
      font-size: 0.875rem; font-weight: 600; color: var(--text);
      margin-bottom: 0.35rem; line-height: 1.35;
    }
    .task-meta {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .task-source {
      font-size: 0.68rem; font-weight: 600; padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }
    .task-source.amber { background: rgba(245,158,11,0.12); color: var(--amber-400); }
    .task-source.blue { background: rgba(96,165,250,0.12); color: var(--blue-400); }
    .task-source.green { background: rgba(74,222,128,0.12); color: var(--green-400); }
    .task-section { font-size: 0.68rem; color: var(--text-muted); }
    .task-due {
      font-size: 0.68rem; font-family: 'JetBrains Mono', monospace;
      color: var(--red-400); margin-left: auto;
    }
    .task-recurring { font-size: 0.68rem; color: var(--text-muted); }

    /* ── Empty / skeleton ── */
    .empty {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-muted); font-size: 0.875rem;
    }
    .skeleton {
      background: var(--bg-card); border-radius: 10px;
      height: 76px; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    .skeletons { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 0.75rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <path d="M8 21h8M12 17v4"/>
    </svg>
    <span><span class="logo-accent">command</span>.center</span>
  </div>

  <nav class="nav-tabs">
    <button class="nav-tab active" data-view="home" onclick="switchView('home')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button class="nav-tab" data-view="urgent" onclick="switchView('urgent')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="var(--red-400)" stroke="none"><path d="M12 2L2 22h20L12 2z"/></svg>
      Urgent
      <span class="tab-badge badge-urgent" id="badge-urgent">0</span>
    </button>
    <button class="nav-tab" data-view="active" onclick="switchView('active')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--amber-400)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Active
      <span class="tab-badge badge-active" id="badge-active">0</span>
    </button>
    <button class="nav-tab" data-view="backlog" onclick="switchView('backlog')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--slate-400)" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Backlog
      <span class="tab-badge badge-backlog" id="badge-backlog">0</span>
    </button>
    <button class="nav-tab" data-view="calendar" onclick="switchView('calendar')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--green-400)" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Calendar
      <span class="tab-badge badge-cal" id="badge-cal">0</span>
    </button>
    <button class="nav-tab" data-view="infra" onclick="switchView('infra')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--green-400)" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Infra
      <span class="tab-badge" style="background:rgba(74,222,128,0.12);color:var(--green-400)" id="badge-infra">0</span>
    </button>
    <button class="nav-tab" data-view="tasks" onclick="switchView('tasks')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--purple-400)" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Tasks
      <span class="tab-badge" style="background:rgba(192,132,252,0.12);color:var(--purple-400)" id="badge-tasks">0</span>
    </button>
    <button class="nav-tab" data-view="repos" onclick="switchView('repos')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--blue-400)" stroke-width="2.5"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      Repos
      <span class="tab-badge badge-repo" id="badge-repos">0</span>
    </button>
  </nav>

  <div class="header-right">
    <div class="live-dot"></div>
    <span class="header-clock" id="clock">—</span>
    <button class="btn-sm" id="refresh-btn" onclick="refreshAll()">

        <path d="M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M8 16H3v5"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

  <!-- Active -->

  <!-- Backlog -->
  <div class="view" id="view-backlog">

    <div class="view-body">

  <!-- Home -->
  <div class="view active" id="view-home">

      <!-- Hero -->

        <div class="home-hero-content">
          <div class="home-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            <span><span style="color:var(--accent)">command</span>.center</span>
          </div>
          <p class="home-tagline" id="home-tagline">Loading…</p>
        </div>
      </div>

      <!-- Stat cards -->
      <div class="home-stats" id="home-stats">
        <div class="home-stat-card skeleton" style="height:110px"></div>
        <div class="home-stat-card skeleton" style="height:110px"></div>
        <div class="home-stat-card skeleton" style="height:110px"></div>
        <div class="home-stat-card skeleton" style="height:110px"></div>
        <div class="home-stat-card skeleton" style="height:110px"></div>
      </div>

      <!-- Next event + recent issues -->
      <div class="home-grid">
        <div class="home-section">
          <div class="home-section-title">Upcoming</div>
          <div id="home-events"><div class="skeleton" style="height:72px"></div></div>
        </div>
        <div class="home-section">
          <div class="home-section-title">Recent Issues</div>
          <div id="home-issues"><div class="skeleton" style="height:72px"></div><div class="skeleton" style="height:72px;margin-top:0.5rem"></div></div>
        </div>
        <div class="home-section">
          <div class="home-section-title">Open Tasks</div>
          <div id="home-tasks"><div class="skeleton" style="height:72px"></div><div class="skeleton" style="height:72px;margin-top:0.5rem"></div></div>
        </div>

    </div>
  </div>

  <!-- Infra -->
  <div class="view" id="view-infra">
    <div class="view-header">
      <div class="view-title">Infrastructure</div>
      <div class="view-subtitle" id="sub-infra">Loading…</div>
    </div>
    <div class="view-body">
      <div class="skeletons" id="col-infra">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="view" id="view-tasks">
    <div class="view-header">
      <div class="view-title">Tasks</div>
      <div class="view-subtitle" id="sub-tasks">Loading…</div>
    </div>
    <div class="view-body">
      <div class="skeletons" id="col-tasks">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="view" id="view-calendar">
    <div class="view-header">
      <div class="view-title">Calendar</div>
      <div class="view-subtitle" id="sub-calendar">Loading…</div>
    </div>
    <div class="view-body">
      <div class="skeletons" id="col-calendar">
        <div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </div>

  <!-- Repos -->
  <div class="view" id="view-repos">
    <div class="view-header">
      <div class="view-title">Repositories</div>
      <div class="view-subtitle" id="sub-repos">Loading…</div>
    </div>
    <div class="view-body">
      <div class="skeletons" id="col-repos">
        <div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── View switching ─────────────────────────────────────────────────────────
  let currentView = 'home';
  let _lastIssues, _lastEvents, _lastTasks, _lastInfra;
  function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    document.querySelector(`[data-view="${id}"]`).classList.add('active');
    currentView = id;
  }

  // ── Clock ──────────────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true,
      timeZone: 'America/Chicago'
    }) + ' CDT';
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Helpers ────────────────────────────────────────────────────────────────
  function timeAgo(iso) {
    const s = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (s < 60) return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;
  }

  function labelClass(name) {
    const n = name.toLowerCase();
    if (n.includes('bug')) return 'bug';
    if (n.includes('enhancement') || n.includes('feature')) return 'enhancement';
    if (n.includes('frontend')) return 'frontend';
    if (n.includes('backend')) return 'backend';
    return '';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderIssueCard(issue) {
    const labels = issue.labels.slice(0, 3).map(l =>
      `<span class="issue-label ${labelClass(l.name)}">${l.name.replace(/[^\w\s-]/g,'').trim()}</span>`
    ).join('');
    return `
      <a class="issue-card" href="${issue.url}" target="_blank">
        <div class="issue-top">
          <div class="issue-title">${escHtml(issue.title)}</div>
          <div class="issue-num">#${issue.number}</div>
        </div>
        <div class="issue-meta">
          <span class="issue-repo">${issue.repo}</span>
          ${labels}
          <span class="issue-age">${timeAgo(issue.createdAt)}</span>
        </div>
      </a>
    `;
  }

  function renderRepoCard(repo) {
    return `
      <a class="repo-card" href="https://github.com/${repo.repoFull}/issues" target="_blank">
        <div class="repo-top">
          <div class="repo-name">${repo.repo}</div>
          <div style="display:flex;align-items:center;gap:0.4rem">
            ${repo.archived ? `<span style="font-size:0.62rem;color:var(--text-muted);background:rgba(255,255,255,0.05);padding:0.1rem 0.35rem;border-radius:3px;font-weight:600">archived</span>` : ''}
            ${repo.tracked ? `<span style="font-size:0.62rem;color:var(--green-400);background:rgba(74,222,128,0.1);padding:0.1rem 0.35rem;border-radius:3px;font-weight:600">tracked</span>` : ''}
            <div class="repo-open">${repo.openIssues} open</div>
          </div>
        </div>
        <div class="repo-stats">
          ${repo.tracked ? `
          <div class="repo-stat">
            <div class="repo-stat-label">Bugs</div>
            <div class="repo-stat-val red">${repo.bugs}</div>
          </div>
          <div class="repo-stat">
            <div class="repo-stat-label">Features</div>
            <div class="repo-stat-val blue">${repo.enhancements}</div>
          </div>` : ''}
          ${repo.lastActivity ? `
          <div class="repo-stat">
            <div class="repo-stat-label">Last Issue</div>
            <div class="repo-stat-val">${timeAgo(repo.lastActivity)}</div>
          </div>` : ''}
        </div>
      </a>
    `;
  }

  // ── Fetch ──────────────────────────────────────────────────────────────────
  async function fetchIssues() {
    const res = await fetch('/api/issues');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    document.getElementById('badge-urgent').textContent = data.urgent.length;
    document.getElementById('badge-active').textContent = data.active.length;
    document.getElementById('badge-backlog').textContent = data.deferred.length;

    document.getElementById('sub-urgent').textContent = `${data.urgent.length} issues · Updated ${timeAgo(data.updatedAt)}`;
    document.getElementById('sub-active').textContent = `${data.active.length} issues · Updated ${timeAgo(data.updatedAt)}`;
    document.getElementById('sub-backlog').textContent = `${data.deferred.length} issues · Updated ${timeAgo(data.updatedAt)}`;

    const render = (id, arr, cls) => {
      const el = document.getElementById(id);
      el.className = cls;
      el.innerHTML = arr.length ? arr.map(renderIssueCard).join('') : '<div class="empty">Nothing here 🎉</div>';
    };
    render('col-urgent', data.urgent, 'issues-grid');
    render('col-active', data.active, 'issues-grid');
    render('col-deferred', data.deferred, 'issues-grid');
  }

  // ── Home view ────────────────────────────────────────────────────────────
  function renderHome(issues, events, tasks, repos, infra) {
    if (!issues || !events || !tasks || !repos || !infra) return;

    const urgent = issues.urgent.length;
    const active = issues.active.length;
    const backlog = issues.deferred.length;
    const totalIssues = urgent + active + backlog;
    const totalTasks = tasks.length;
    const onlineServices = infra.filter(p => p.status === 'online').length;
    const totalServices = infra.length;
    const nextEvents = events.filter(e => new Date(e.start) > new Date()).slice(0, 3);
    const recentIssues = [...issues.urgent, ...issues.active].slice(0, 4);
    const openTasks = tasks.slice(0, 4);

    // Tagline
    const now = new Date();
    document.getElementById('home-tagline').textContent =
      now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric', timeZone: 'America/Chicago' }) +
      (urgent > 0 ? ` · ${urgent} urgent issue${urgent > 1 ? 's' : ''} need attention` : ' · All clear');

    // Stat cards
    document.getElementById('home-stats').innerHTML = `
      <button class="home-stat-card" onclick="switchView('urgent')" style="border-left:3px solid var(--red-400)">
        <div class="home-stat-label">Urgent</div>
        <div class="home-stat-val" style="color:var(--red-400)">${urgent}</div>
        <div class="home-stat-sub">open bugs &amp; critical</div>
      </button>
      <button class="home-stat-card" onclick="switchView('active')" style="border-left:3px solid var(--amber-400)">
        <div class="home-stat-label">Active</div>
        <div class="home-stat-val" style="color:var(--amber-400)">${active}</div>
        <div class="home-stat-sub">in-progress issues</div>
      </button>
      <button class="home-stat-card" onclick="switchView('backlog')" style="border-left:3px solid var(--slate-400)">
        <div class="home-stat-label">Backlog</div>
        <div class="home-stat-val" style="color:var(--slate-400)">${backlog}</div>
        <div class="home-stat-sub">${totalIssues} total open</div>
      </button>
      <button class="home-stat-card" onclick="switchView('tasks')" style="border-left:3px solid var(--purple-400)">
        <div class="home-stat-label">Tasks</div>
        <div class="home-stat-val" style="color:var(--purple-400)">${totalTasks}</div>
        <div class="home-stat-sub">open in Obsidian</div>
      </button>
      <button class="home-stat-card" onclick="switchView('infra')" style="border-left:3px solid var(--green-400)">
        <div class="home-stat-label">Infra</div>
        <div class="home-stat-val" style="color:var(--green-400)">${onlineServices}<span style="font-size:1rem;font-weight:600;color:var(--text-muted)">/${totalServices}</span></div>
        <div class="home-stat-sub">services online</div>
      </button>
    `;

    // Upcoming events
    document.getElementById('home-events').innerHTML = nextEvents.length
      ? nextEvents.map(e => {
          const start = new Date(e.start);
          const dateStr = start.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'America/Chicago' });
          const timeStr = e.allDay ? 'All day' : start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Chicago' });
          return `<div class="home-event-item" onclick="switchView('calendar')">
            <div class="home-item-title">${escHtml(e.title)}</div>
            <div class="home-item-meta"><span class="home-item-accent">${dateStr} · ${timeStr}</span><span>${e.calendar}</span></div>
          </div>`;
        }).join('')
      : '<div class="empty" style="padding:1rem">No upcoming events</div>';

    // Recent issues
    document.getElementById('home-issues').innerHTML = recentIssues.length
      ? recentIssues.map(i => `
          <a class="home-issue-item" href="${i.url}" target="_blank">
            <div class="home-item-title">${escHtml(i.title)}</div>
            <div class="home-item-meta"><span class="home-item-accent">${i.repo}</span><span>#${i.number}</span><span>${timeAgo(i.createdAt)}</span></div>
          </a>`).join('')
      : '<div class="empty" style="padding:1rem">No urgent issues 🎉</div>';

    // Open tasks
    document.getElementById('home-tasks').innerHTML = openTasks.length
      ? openTasks.map(t => `
          <div class="home-task-item" onclick="switchView('tasks')">
            <div class="home-item-title">${escHtml(t.title)}</div>
            <div class="home-item-meta"><span class="home-item-accent">${t.source}</span>${t.section ? `<span>${escHtml(t.section)}</span>` : ''}${t.due ? `<span style="color:var(--red-400)">📅 ${t.due}</span>` : ''}</div>
          </div>`).join('')
      : '<div class="empty" style="padding:1rem">All done! 🎉</div>';
  }

  const SERVICE_DOMAINS = {
    'armory-backend':      'armory.test',
    'armory-frontend':     'armory-ui.test',
    'damagelabs-frontend': 'damagelabs.test',
    'fusion94':            'fusion94.test',
    'openclaw-dashboard':  'dashboard.test',
    'uas-backend':         'uas-api.test',
    'uas-frontend':        'uas-log.test',
    'infra-dash':          'infra.test',
    'command-center':      'command.test',
  };

  function formatUptime(ms) {
    if (!ms) return '—';
    const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60), d = Math.floor(h/24);
    if (d > 0) return `${d}d ${h%24}h`;
    if (h > 0) return `${h}h ${m%60}m`;
    if (m > 0) return `${m}m ${s%60}s`;
    return `${s}s`;
  }
  function formatMem(b) { return b ? (b/1024/1024).toFixed(1)+' MB' : '0 MB'; }

  async function fetchInfra() {
    const res = await fetch('/api/infra');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    const procs = data.processes;
    const online = procs.filter(p => p.status === 'online').length;
    const down = procs.filter(p => p.status !== 'online').length;
    const restarts = procs.reduce((s,p) => s + (p.restarts||0), 0);
    document.getElementById('badge-infra').textContent = online + '/' + procs.length;
    document.getElementById('sub-infra').textContent = `${online} online · ${down} down · ${restarts} total restarts`;
    const el = document.getElementById('col-infra');
    el.innerHTML = `
      <div class="infra-summary">
        <div class="infra-stat"><div class="infra-stat-label">Total</div><div class="infra-stat-val">${procs.length}</div></div>
        <div class="infra-stat"><div class="infra-stat-label">Online</div><div class="infra-stat-val green">${online}</div></div>
        <div class="infra-stat"><div class="infra-stat-label">Down</div><div class="infra-stat-val red">${down}</div></div>
        <div class="infra-stat"><div class="infra-stat-label">Restarts</div><div class="infra-stat-val amber">${restarts}</div></div>
      </div>
      <div class="infra-grid">
        ${procs.map(p => {
          const sc = p.status === 'online' ? 'online' : p.status === 'erroring' ? 'erroring' : 'stopped';
          const domain = SERVICE_DOMAINS[p.name];
          return `
            <div class="process-card ${sc}">
              <div class="process-top">
                <div class="process-name">${p.name}</div>
                <div class="process-badge ${sc}"><div class="dot"></div>${p.status}</div>
              </div>
              <div class="process-metrics">
                <div class="pm"><div class="pm-label">Uptime</div><div class="pm-val accent">${formatUptime(p.uptime)}</div></div>
                <div class="pm"><div class="pm-label">Memory</div><div class="pm-val">${formatMem(p.memory)}</div></div>
                <div class="pm"><div class="pm-label">Restarts</div><div class="pm-val ${p.restarts > 5 ? 'accent' : ''}">${p.restarts}</div></div>
              </div>
              <div class="process-id">
                #${p.id} · PID ${p.pid || '—'}
                ${domain ? ` · <a href="https://${domain}" target="_blank" style="color:var(--accent);text-decoration:none;">↗ ${domain}</a>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  async function fetchTasks() {
    const res = await fetch('/api/tasks');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    const tasks = data.tasks;
    document.getElementById('badge-tasks').textContent = tasks.length;
    document.getElementById('sub-tasks').textContent = `${tasks.length} open tasks · General, CA, TX`;
    const el = document.getElementById('col-tasks');
    el.className = 'tasks-grid';
    if (!tasks.length) { el.innerHTML = '<div class="empty">All done! 🎉</div>'; return; }
    el.innerHTML = tasks.map(t => `
      <div class="task-card ${t.color}">
        <div class="task-title">${escHtml(t.title)}</div>
        <div class="task-meta">
          <span class="task-source ${t.color}">${t.source}</span>
          ${t.section ? `<span class="task-section">${escHtml(t.section)}</span>` : ''}
          ${t.recurring ? '<span class="task-recurring">🔁 recurring</span>' : ''}
          ${t.due ? `<span class="task-due">📅 ${t.due}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  async function fetchCalendar() {
    const res = await fetch('/api/calendar');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    const now = new Date();
    const events = data.events;
    document.getElementById('badge-cal').textContent = events.length;
    document.getElementById('sub-calendar').textContent = `${events.length} upcoming events · next 30 days`;

    const col = document.getElementById('col-calendar');
    col.className = 'cal-grid';
    if (!events.length) {
      col.innerHTML = '<div class="empty">No upcoming events 🎉</div>';
      return;
    }
    col.innerHTML = events.map(e => {
      const start = new Date(e.start);
      const end = new Date(e.end);
      const isToday = start.toDateString() === now.toDateString();
      const isSoon = start > now && (start - now) < 2 * 60 * 60 * 1000;
      const isPast = end < now;
      let cardClass = e.calendar === 'Work' ? 'work' : '';
      if (isSoon) cardClass = 'soon';
      if (isToday && !isSoon) cardClass = 'today';
      const timeStr = e.allDay ? 'All day' :
        start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Chicago' }) +
        ' – ' + end.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Chicago' });
      const dateStr = isToday ? 'Today' :
        start.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'America/Chicago' });
      return `
        <div class="event-card ${cardClass}" style="${isPast ? 'opacity:0.45' : ''}">
          <div class="event-title">${escHtml(e.title)}</div>
          <div class="event-time">${dateStr} · ${timeStr}</div>
          <div class="event-sub">
            <span class="event-cal-badge ${e.calendar === 'Personal' ? 'personal' : ''}">${e.calendar}</span>
            ${e.location ? `<span>📍 ${escHtml(e.location.substring(0,40))}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  async function fetchRepos() {
    const res = await fetch('/api/repos');
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    const repos = data.repos.sort((a,b) => b.openIssues - a.openIssues);
    document.getElementById('badge-repos').textContent = repos.length;
    document.getElementById('sub-repos').textContent = `${repos.length} repos · ${repos.reduce((s,r) => s + r.openIssues, 0)} open issues total`;
    const el = document.getElementById('col-repos');
    el.className = 'repos-grid';
    el.innerHTML = repos.map(renderRepoCard).join('');
  }

  async function refreshAll() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    try {
      await fetch('/api/refresh', { method: 'POST' });
      await Promise.all([fetchIssues(), fetchCalendar(), fetchRepos(), fetchTasks(), fetchInfra()]);
    } catch(e) { console.error(e); }
    btn.classList.remove('spinning');
  }

  async function poll() {
    try {
      await Promise.all([fetchIssues(), fetchCalendar(), fetchRepos(), fetchTasks(), fetchInfra()]);
      // Update home after all data is fresh
      const [issRes, evtRes, taskRes, infraRes] = await Promise.all([
        fetch('/api/issues').then(r=>r.json()),
        fetch('/api/calendar').then(r=>r.json()),
        fetch('/api/tasks').then(r=>r.json()),
        fetch('/api/infra').then(r=>r.json()),
      ]);
      renderHome(
        issRes.ok ? issRes : null,
        evtRes.ok ? evtRes.events : null,
        taskRes.ok ? taskRes.tasks : null,
        null,
        infraRes.ok ? infraRes.processes : null,
      );
    } catch(e) { console.error(e); }
  }

  poll();
  setInterval(poll, 30000);
</script>
</body>
</html>
