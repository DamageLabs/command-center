<div class="min-h-screen bg-slate-950 text-slate-100">
  <header class="border-b border-white/10 bg-slate-950/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl flex-col gap-6 px-6 py-6 lg:px-8">
      <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.35em] text-amber-300/90">command.center rewrite</p>
          <h1 class="mt-3 text-3xl font-semibold tracking-tight text-white sm:text-4xl">Angular + Tailwind scaffold</h1>
          <p class="mt-3 max-w-3xl text-sm leading-7 text-slate-300">
            Safe frontend foundation for the rewrite. The current Express backend and local runtime stay intact while Angular starts taking over the UI layer.
          </p>
        </div>
        <div class="inline-flex h-fit rounded-full border border-sky-400/20 bg-sky-400/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.25em] text-sky-200">
          Issue #68
        </div>
      </div>

      <nav class="flex flex-wrap gap-3">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="item.path"
            routerLinkActive="border-amber-300/40 bg-amber-300/15 text-white"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
            class="rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm font-medium text-slate-300 transition hover:border-white/20 hover:bg-white/10 hover:text-white"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-8 lg:px-8 lg:py-10">
    <router-outlet></router-outlet>
  </main>
</div>
